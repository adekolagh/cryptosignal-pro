name: CryptoSignal Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          NANSEN_API_KEYS:          ${{ secrets.NANSEN_API_KEYS }}
          NANSEN_API_KEY:           ${{ secrets.NANSEN_API_KEY }}
          ETHERSCAN_API_KEYS:       ${{ secrets.ETHERSCAN_API_KEYS }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOCOMPARE_API_KEY:    ${{ secrets.CRYPTOCOMPARE }}
        run: python scan_once.py

      - name: Save signals to repo
        run: |
          git config user.name "CryptoSignal Bot"
          git config user.email "bot@cryptosignal"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git add templates/signals.json
          git diff --staged --quiet || git commit -m "signals $(date -u '+%H:%M UTC')"
          git pull origin main --rebase --autostash
          git push origin main
